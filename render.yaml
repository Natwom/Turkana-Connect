services:
  # Frontend Static Site
  - type: static
    name: apiaro-music-frontend
    env: static
    runtime: node
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://turkana-connect-api.onrender.com

  # Admin Static Site (if separate)
  - type: static
    name: apiaro-music-admin
    env: static
    runtime: node
    buildCommand: cd admin && npm install && npm run build
    staticPublishPath: ./admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://turkana-connect-api.onrender.com

  # Backend Web Service
  - type: web
    name: turkana-connect-api
    env: python
    runtime: python3
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        value: djlnqcwmz
      - key: CLOUDINARY_API_KEY
        value: 437893188264331
      - key: CLOUDINARY_API_SECRET
        sync: false